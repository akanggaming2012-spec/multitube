<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MultiTube</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen p-4">

  <h1 class="text-4xl font-bold text-pink-500 mb-6 text-center">MULTITUBE</h1>

  <input id="searchInput" type="text" 
         class="w-full bg-zinc-900 border border-zinc-700 rounded-full py-4 px-6 mb-6"
         placeholder="Cari video... (milf, indo, hentai)">

  <h2 class="text-xl mb-4">🔥 Trending Video</h2>
  <div id="results" class="grid grid-cols-2 gap-4"></div>

  <script>
    const API = "https://multitube-api.onrender.com";

    async function cari(query = "milf") {
      const hasil = document.getElementById('results');
      hasil.innerHTML = "<p class='text-center py-10'>Memuat...</p>";

      try {
        const res = await fetch(`${API}/pornhub/search?key=${query}`);
        const data = await res.json();

        let videos = data.data?.videos || data.videos || [];

        if (videos.length === 0) {
          hasil.innerHTML = "<p class='text-center py-10 text-yellow-400'>Tidak ada video.<br>Coba kata lain</p>";
          return;
        }

        let html = "";
        videos.forEach(v => {
          html += `
            <div onclick="window.open('${v.link || v.url}', '_blank')" class="bg-zinc-900 rounded-2xl overflow-hidden">
              <img src="${v.image || v.thumbnail}" class="w-full h-40 object-cover">
              <div class="p-3">
                <p class="text-sm line-clamp-2">${v.title}</p>
              </div>
            </div>
          `;
        });
        hasil.innerHTML = html;
      } catch(e) {
        hasil.innerHTML = "<p class='text-center py-10 text-red-400'>Gagal memuat video</p>";
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === "Enter") cari(e.target.value || "milf");
    });

    window.onload = () => cari("indo");
  </script>
</body>
</html>
