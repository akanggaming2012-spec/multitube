<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MultiTube - Video Dewasa Gratis</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4">

  <h1 class="text-4xl font-bold text-pink-500 mb-6 text-center">MULTITUBE</h1>

  <input id="searchInput" type="text" 
         class="w-full bg-zinc-900 border border-zinc-700 rounded-full py-4 px-6 mb-6"
         placeholder="Cari video... (indo, milf, hentai)">

  <div class="flex justify-between mb-4">
    <h2 class="text-xl font-semibold">🔥 Trending Video</h2>
    <button onclick="loadVideos()" class="text-pink-500 font-medium">↻ Refresh</button>
  </div>

  <div id="results" class="grid grid-cols-2 gap-4"></div>

  <footer class="text-center mt-12 text-zinc-500 text-xs">
    Powered by Lustpress • MultiTube 2026
  </footer>

  <script>
    const API_BASE = "https://multitube-api.onrender.com";
    const PROXY = "https://corsproxy.io/?";

    async function loadVideos(query = "indo") {
      const container = document.getElementById('results');
      container.innerHTML = `<p class="col-span-full text-center py-12">Memuat video...</p>`;

      try {
        const res = await fetch(PROXY + encodeURIComponent(`${API_BASE}/pornhub/search?key=${query}`));
        const data = await res.json();

        let videos = data.data?.videos || data.videos || [];

        if (videos.length === 0) {
          container.innerHTML = `<p class="col-span-full text-center py-12 text-yellow-400">Tidak ada video.<br>Coba kata lain atau klik Refresh</p>`;
          return;
        }

        let html = '';
        videos.forEach(v => {
          html += `
            <div onclick="window.open('${v.link || v.url}', '_blank')" class="bg-zinc-900 rounded-xl overflow-hidden cursor-pointer">
              <img src="${v.image || v.thumbnail}" class="w-full aspect-video object-cover">
              <div class="p-3">
                <p class="text-sm line-clamp-2">${v.title}</p>
              </div>
            </div>`;
        });
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<p class="col-span-full text-center py-12 text-red-400">Gagal memuat.<br>Klik Refresh beberapa kali</p>`;
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') loadVideos(e.target.value.trim() || "indo");
    });

    window.onload = () => loadVideos("indo");
  </script>
</body>
</html>
