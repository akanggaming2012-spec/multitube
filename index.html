<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MultiTube</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <div class="p-4">
    <h1 class="text-4xl font-bold text-pink-500 mb-6">MULTITUBE</h1>

    <input id="search" type="text" placeholder="Cari video... (indo, milf, hentai)" 
           class="w-full bg-zinc-900 border border-zinc-700 rounded-full py-4 px-6 mb-6">

    <button onclick="load()" class="bg-pink-600 hover:bg-pink-700 px-6 py-3 rounded-full mb-6">
      🔄 Load Video
    </button>

    <div id="hasil" class="grid grid-cols-2 gap-4"></div>
  </div>

  <script>
    const API = "https://multitube-api.onrender.com";

    async function load(q = "indo") {
      const hasil = document.getElementById('hasil');
      hasil.innerHTML = "<p class='text-center py-10'>Memuat video...</p>";

      try {
        const r = await fetch(`${API}/pornhub/search?key=${q}`);
        const d = await r.json();

        let videos = d.data?.videos || d.videos || [];

        if (videos.length === 0) {
          hasil.innerHTML = "<p class='text-center py-10 text-yellow-400'>Tidak ada video. Coba kata lain.</p>";
          return;
        }

        let html = "";
        videos.forEach(v => {
          html += `
            <div onclick="window.open('${v.link || v.url}', '_blank')" class="bg-zinc-900 rounded-2xl overflow-hidden">
              <img src="${v.image || v.thumbnail}" class="w-full h-44 object-cover">
              <div class="p-3 text-sm">${v.title}</div>
            </div>`;
        });
        hasil.innerHTML = html;
      } catch(e) {
        hasil.innerHTML = "<p class='text-center py-10 text-red-400'>Gagal memuat</p>";
      }
    }

    document.getElementById('search').addEventListener('keypress', e => {
      if (e.key === "Enter") load(e.target.value || "indo");
    });

    window.onload = () => load("indo");
  </script>
</body>
</html>
